pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
}

es-processors-sagas {
    recovery {
        strategy {
            type = "local"
            local {
                storage_path = "pekko-processors-sagas/src/main/resources/recovery"
            },
            redis {
                host = localhost
                username = ""
                password = ""
            }
        }
    }
}